<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRIFOLIO — Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">LIBRIFOLIO</a>
            <button class="header__burger" aria-label="Открыть меню">MENU</button>
            <nav class="header__nav">
                <a href="index.html" class="header__link">Главная</a>
                <a href="products.html" class="header__link">Каталог книг</a>
                <a href="registration.html" class="header__link header__link--active">Регистрация</a>
                <a href="account.html" class="header__link">Личный кабинет</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="form-box">
            <h1 class="form-box__title">Регистрация</h1>
            <form id="regForm" novalidate>
                <div class="form-group">
                    <label class="form-group__label" for="username">Логин</label>
                    <input class="form-group__input" type="text" id="username">
                    <div class="form-group__error">Ошибка</div>
                </div>
                <div class="form-group">
                    <label class="form-group__label" for="email">Email</label>
                    <input class="form-group__input" type="email" id="email">
                    <div class="form-group__error">Ошибка</div>
                </div>
                <div class="form-group">
                    <label class="form-group__label" for="password">Пароль</label>
                    <input class="form-group__input" type="password" id="password">
                    <div class="form-group__error">Ошибка</div>
                </div>
                <div class="form-group">
                    <label class="form-group__label" for="confirmPassword">Подтверждение пароля</label>
                    <input class="form-group__input" type="password" id="confirmPassword">
                    <div class="form-group__error">Ошибка</div>
                </div>
                
                <label class="form-box__checkbox-label">
                    <input class="form-box__checkbox" type="checkbox" id="agreement">
                    <span>Я согласен предоставить информацию</span>
                </label>
                <div class="form-group__error" id="agreementError" style="margin-bottom:15px;">Необходимо согласие</div>

                <button class="form-box__submit-btn" type="submit">Зарегистрироваться</button>
                <div class="form-box__footer">Уже есть аккаунт? <a href="#" class="form-box__link">Войти</a></div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__info">
                <h4 class="footer__title">LIBRIFOLIO</h4>
                <p class="footer__text">+7 (999) 123-45-67</p>
                <p class="footer__text">Email: info@librifolio.com</p>
            </div>
            <div class="footer__socials">
                <h4 class="footer__title">Мы в соцсетях</h4>
                <a href="#" class="footer__link">Telegram</a>
                <a href="#" class="footer__link">VKontakte</a>
            </div>
        </div>
        <div class="footer__bottom">&copy; 2026 LIBRIFOLIO.</div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
